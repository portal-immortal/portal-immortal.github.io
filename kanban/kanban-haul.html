<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kanban — Haul</title>
  <style>
    body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;line-height:1.3;margin:0;background:#0f172a;color:#e6eef8}
    .wrap{max-width:1100px;margin:32px auto;padding:20px}
    header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    h1{font-size:20px;margin:0}
    .hstat{display:flex;gap:12px;align-items:center;color:#93c5fd;font-size:13px}
    .hstat .last-save{font-size:12px;color:#9ca3af}
    .board{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .col{background:#071127;padding:12px;border-radius:8px}
    .col h3{margin:0 0 8px 0;color:#60a5fa}
    .card{background:#021129;padding:10px;border-radius:6px;margin-bottom:10px;color:#cfe8ff}
    .card .meta{font-size:12px;color:#94a3b8;margin-top:8px}
    .controls{display:flex;gap:8px;margin-bottom:12px}
    .controls input,.controls select{padding:8px;border-radius:6px;border:1px solid #16324a;background:#02172a;color:#e6eef8}
    .btn{padding:8px 10px;border-radius:6px;border:none;background:#2563eb;color:#fff;cursor:pointer}
    .toast{position:fixed;right:16px;bottom:16px;background:#032b4a;color:#bde0ff;padding:10px 14px;border-radius:8px;box-shadow:0 6px 18px rgba(2,6,23,0.6);display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Kanban Haul</h1>
        <div class="hstat" id="headerStats">
          <div id="progPct">0%</div>
          <div class="last-save" id="lastSave">belum disimpan</div>
        </div>
      </div>
      <div>
        <button class="btn" id="clearBtn">Reset contoh</button>
      </div>
    </header>

    <div class="controls">
      <input id="newTask" placeholder="Judul tugas" />
      <input id="newCat" placeholder="Kategori" />
      <select id="newCol">
        <option value="todo">To Do</option>
        <option value="doing">Doing</option>
        <option value="done">Done</option>
      </select>
      <button class="btn" id="addBtn">Tambah</button>
    </div>

    <div class="board" id="board">
      <div class="col" id="col-todo">
        <h3>To Do</h3>
        <div id="cards-todo"></div>
      </div>
      <div class="col" id="col-doing">
        <h3>Doing</h3>
        <div id="cards-doing"></div>
      </div>
      <div class="col" id="col-done">
        <h3>Done</h3>
        <div id="cards-done"></div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    (function(){
      const STORAGE_KEY = 'kanban_haul_v2';
      let tasks = [];
      let nextId = 1;
      let lastSaveTime = 0;
      const autoSaveDelay = 300;
      let autoSaveTimer = null;

      const defaultTasks = [
        {id:1,title:'Rencanakan acara haul',cat:'Admin',col:'todo',modified:Date.now()},
        {id:2,title:'Hubungi donatur',cat:'Outreach',col:'doing',modified:Date.now()},
        {id:3,title:'Susun daftar penerima',cat:'Logistik',col:'done',modified:Date.now()}
      ];

      // util: human readable recent time
      function formatTimeRecent(ts){
        if(!ts) return '—';
        const s = Math.floor((Date.now()-ts)/1000);
        if(s < 10) return 'baru saja';
        if(s < 60) return s+' detik lalu';
        const m = Math.floor(s/60);
        if(m < 60) return m+' menit lalu';
        const h = Math.floor(m/60);
        if(h < 24) return h+' jam lalu';
        const d = new Date(ts);
        return d.toLocaleString();
      }

      function showToast(message){
        const t = document.getElementById('toast');
        t.textContent = message;
        t.style.display = 'block';
        clearTimeout(t._hide);
        t._hide = setTimeout(()=>{t.style.display='none'}, 2500);
      }

      function save(){
        try{
          lastSaveTime = Date.now();
          localStorage.setItem(STORAGE_KEY, JSON.stringify({tasks,nextId,lastSaveTime}));
          updateHeaderStats();
          showToast('Tersimpan '+formatTimeRecent(lastSaveTime));
        }catch(e){
          console.error('Save error',e);
          showToast('Gagal menyimpan');
        }
      }

      function autoSave(){
        clearTimeout(autoSaveTimer);
        autoSaveTimer = setTimeout(save, autoSaveDelay);
      }

      function load(){
        try{
          const raw = localStorage.getItem(STORAGE_KEY);
          if(raw){
            const obj = JSON.parse(raw);
            tasks = obj.tasks || [];
            nextId = obj.nextId || (tasks.reduce((m,t)=>Math.max(m,t.id),0)+1) || 1;
            lastSaveTime = obj.lastSaveTime || 0;
          }else{
            tasks = defaultTasks.slice();
            nextId = tasks.reduce((m,t)=>Math.max(m,t.id),0)+1;
            lastSaveTime = 0;
            save();
          }
        }catch(e){
          console.error('Load error',e);
          tasks = defaultTasks.slice();
          nextId = tasks.reduce((m,t)=>Math.max(m,t.id),0)+1;
        }
      }

      function updateHeaderStats(){
        const total = tasks.length;
        const done = tasks.filter(t=>t.col==='done').length;
        const pct = total?Math.round((done/total)*100):0;
        document.getElementById('progPct').textContent = pct+'%';
        document.getElementById('lastSave').textContent = lastSaveTime?('terakhir: '+formatTimeRecent(lastSaveTime)):'belum disimpan';
      }

      function render(){
        ['todo','doing','done'].forEach(col=>{
          const container = document.getElementById('cards-'+col);
          container.innerHTML = '';
          tasks.filter(t=>t.col===col).forEach(t=>{
            const el = document.createElement('div');
            el.className = 'card';
            el.innerHTML = `<div><strong>${escapeHtml(t.title)}</strong> <span style="float:right;color:#93c5fd">${escapeHtml(t.cat||'')}</span></div>`+
                           `<div class="meta">⏱ ${formatTimeRecent(t.modified)} &nbsp; <button data-id="${t.id}" data-action="left">◀</button> <button data-id="${t.id}" data-action="right">▶</button> <button data-id="${t.id}" data-action="del">🗑</button></div>`;
            container.appendChild(el);
          });
        });
        updateHeaderStats();
      }

      function escapeHtml(s){
        if(!s) return '';
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      function addTask(title,cat,col){
        if(!title) return;
        const t = {id: nextId++, title:title.trim(), cat:cat?cat.trim():'', col:col||'todo', modified: Date.now()};
        tasks.push(t);
        render();
        autoSave();
      }

      function moveTask(id,dir){
        const t = tasks.find(x=>x.id==id); if(!t) return;
        const order = ['todo','doing','done'];
        let idx = order.indexOf(t.col);
        if(dir==='right' && idx < order.length-1) idx++;
        if(dir==='left' && idx > 0) idx--;
        t.col = order[idx];
        t.modified = Date.now();
        render();
        autoSave();
      }

      function deleteTask(id){
        const idx = tasks.findIndex(x=>x.id==id); if(idx<0) return;
        tasks.splice(idx,1);
        render();
        autoSave();
      }

      // events
      document.addEventListener('click', function(e){
        const a = e.target;
        if(a.dataset && a.dataset.id){
          const id = Number(a.dataset.id);
          const action = a.dataset.action;
          if(action==='left') moveTask(id,'left');
          if(action==='right') moveTask(id,'right');
          if(action==='del') deleteTask(id);
        }
      });

      document.getElementById('addBtn').addEventListener('click', ()=>{
        const title = document.getElementById('newTask').value;
        const cat = document.getElementById('newCat').value;
        const col = document.getElementById('newCol').value;
        addTask(title,cat,col);
        document.getElementById('newTask').value = '';
        document.getElementById('newCat').value = '';
      });

      document.getElementById('clearBtn').addEventListener('click', ()=>{
        if(confirm('Reset ke contoh bawaan?')){
          tasks = defaultTasks.slice();
          nextId = tasks.reduce((m,t)=>Math.max(m,t.id),0)+1;
          save();
          render();
        }
      });

      // initial load
      load();
      render();

      // expose for debugging
      window._kanban = {tasks,save,load,render};
    })();
  </script>
</body>
</html><!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban Persiapan Acara Peringatan Haul</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --surface: #fdfaf5;
    --surface2: #f0ebe0;
    --border: #ddd6c8;
    --border2: #c8bfad;
    --text: #1a1612;
    --text2: #6b6055;
    --text3: #9e9085;
    --accent: #8b5e3c;
    --accent-bg: #f7ede2;

    --todo-dot: #b0a090;
    --doing-dot: #5b8fcc;
    --done-dot: #5a9a6a;

    --cat-konsumsi-bg: #fff3e0; --cat-konsumsi-text: #8b4513;
    --cat-dekorasi-bg: #fce4ec; --cat-dekorasi-text: #8b1a4a;
    --cat-undangan-bg: #e3f0ff; --cat-undangan-text: #1a5296;
    --cat-perlengkapan-bg: #e8f5e9; --cat-perlengkapan-text: #1b5e20;
    --cat-acara-bg: #ede7f6; --cat-acara-text: #4527a0;
    --cat-koordinasi-bg: #e0f7f0; --cat-koordinasi-text: #00574b;
    --cat-lainnya-bg: #f0ebe0; --cat-lainnya-text: #6b6055;
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1.5px solid var(--border);
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon {
    width: 38px; height: 38px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .brand h1 { font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .brand p { font-size: 12px; color: var(--text2); }
  .header-stats { display: flex; gap: 8px; flex-wrap: wrap; }
  .hstat {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--text2);
  }
  .hstat strong { color: var(--text); font-weight: 600; }
  .hstat.last-save { font-size: 11px; color: var(--text3); }

  /* ── MAIN ── */
  main { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }

  /* ── ADD FORM ── */
  .add-section {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .add-section input[type="text"] {
    flex: 1;
    min-width: 200px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 14px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .add-section input[type="text"]:focus { border-color: var(--accent); }
  .add-section input[type="text"]::placeholder { color: var(--text3); }
  select {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  select:focus { border-color: var(--accent); }
  .btn-add {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-add:hover { opacity: 0.88; }
  .btn-add:active { transform: scale(0.97); }

  /* ── PROGRESS ── */
  .progress-wrap { margin-bottom: 1.5rem; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 5px; }
  .progress-bar { background: var(--surface2); border-radius: 99px; height: 8px; overflow: hidden; border: 1px solid var(--border); }
  .progress-fill { background: var(--done-dot); height: 100%; border-radius: 99px; transition: width 0.4s ease; }

  /* ── BOARD ── */
  .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
  @media (max-width: 700px) { .board { grid-template-columns: 1fr; } }
  @media (max-width: 1000px) and (min-width: 701px) { .board { grid-template-columns: 1fr 1fr; } }

  .column {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    min-height: 240px;
    display: flex;
    flex-direction: column;
  }
  .col-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .col-title {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .col-dot { width: 9px; height: 9px; border-radius: 50%; }
  .col-count {
    font-size: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 2px 9px;
    color: var(--text2);
    font-weight: 500;
  }
  .cards { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .empty-col {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: var(--text3);
    font-style: italic;
    padding: 24px 0;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    position: relative;
    transition: border-color 0.15s, box-shadow 0.15s;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  .card:hover { border-color: var(--border2); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .card-cat {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 99px;
    margin-bottom: 5px;
    letter-spacing: 0.02em;
  }
  .card-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.45;
    padding-right: 22px;
    margin-bottom: 8px;
  }
  .card-footer {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }
  .card-btn {
    font-size: 11px;
    padding: 3px 9px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text2);
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    transition: background 0.12s, color 0.12s;
  }
  .card-btn:hover { background: var(--surface2); color: var(--text); }
  .card-btn.done-badge {
    background: #e8f5e9;
    color: #1b5e20;
    border-color: #b8dfc0;
    cursor: default;
  }
  .del-btn {
    position: absolute;
    top: 8px; right: 8px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 15px;
    color: var(--text3);
    padding: 2px 4px;
    border-radius: 4px;
    line-height: 1;
    transition: background 0.1s, color 0.1s;
  }
  .del-btn:hover { background: #fce4ec; color: #c62828; }

  /* ── CATEGORY COLORS ── */
  .cat-konsumsi { background: var(--cat-konsumsi-bg); color: var(--cat-konsumsi-text); }
  .cat-dekorasi { background: var(--cat-dekorasi-bg); color: var(--cat-dekorasi-text); }
  .cat-undangan { background: var(--cat-undangan-bg); color: var(--cat-undangan-text); }
  .cat-perlengkapan { background: var(--cat-perlengkapan-bg); color: var(--cat-perlengkapan-text); }
  .cat-acara { background: var(--cat-acara-bg); color: var(--cat-acara-text); }
  .cat-koordinasi { background: var(--cat-koordinasi-bg); color: var(--cat-koordinasi-text); }
  .cat-lainnya { background: var(--cat-lainnya-bg); color: var(--cat-lainnya-text); }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #1a1612;
    color: #fff;
    padding: 9px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    transition: transform 0.25s ease;
    z-index: 99;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── FILTER ── */
  .filter-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label { font-size: 12px; color: var(--text2); margin-right: 2px; }
  .filter-btn {
    font-size: 12px;
    padding: 4px 12px;
    border: 1.5px solid var(--border);
    border-radius: 99px;
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    transition: all 0.12s;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
</style>
</head>
<body>

let tasks = [];
let nextId = 100;
let activeFilter = 'semua';
let lastSaveTime = Date.now();
let autoSaveDelay = null;

function formatTimeRecent(timestamp) {
  const now = Date.now();
  const diff = now - timestamp;
  const minutes = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);
  
  if (minutes < 1) return 'baru saja';
  if (minutes < 60) return `${minutes}m lalu`;
  if (hours < 24) return `${hours}h lalu`;
  if (days < 7) return `${days}h lalu`;
  
  const date = new Date(timestamp);
  return date.toLocaleDateString('id-ID', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { const d = JSON.parse(raw); tasks = d.tasks; nextId = d.nextId || 100; lastSaveTime = d.lastSaveTime || Date.now(); }
    else tasks = defaultTasks.map(t => ({...t}));
  } catch(e) { tasks = defaultTasks.map(t => ({...t})); }
}

function save() {
  try { 
    lastSaveTime = Date.now();
    localStorage.setItem(STORAGE_KEY, JSON.stringify({tasks, nextId, lastSaveTime})); 
  } catch(e){}
  showToast(`💾 Tersimpan ${formatTimeRecent(lastSaveTime)}`);
}

function autoSave() {
  clearTimeout(autoSaveDelay);
  autoSaveDelay = setTimeout(() => {
    save();
    updateHeaderStats();
  }, 300);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function updateHeaderStats() {
  const total = tasks.length;
  const done = tasks.filter(t => t.col === 'done').length;
  const doing = tasks.filter(t => t.col === 'doing').length;
  const pct = total ? Math.round(done / total * 100) : 0;

  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progPct').textContent = pct + '%';
  document.getElementById('headerStats').innerHTML = `
    <div class="hstat"><strong>${total}</strong> Total</div>
    <div class="hstat"><strong>${doing}</strong> Berjalan</div>
    <div class="hstat"><strong>${done}</strong> Selesai</div>
    <div class="hstat"><strong>${pct}%</strong> Progress</div>
    <div class="hstat last-save">💾 ${formatTimeRecent(lastSaveTime)}</div>
  `;
}

function render() {
  const cols = ['todo','doing','done'];
  const filtered = activeFilter === 'semua' ? tasks : tasks.filter(t => t.cat === activeFilter);

  cols.forEach(col => {
    const items = filtered.filter(t => t.col === col);
    const allInCol = tasks.filter(t => t.col === col).length;
    document.getElementById('cnt-' + col).textContent = activeFilter === 'semua' ? allInCol : `${items.length}/${allInCol}`;

    const el = document.getElementById('cards-' + col);
    if (items.length === 0) {
      el.innerHTML = '<div class="empty-col">Tidak ada tugas</div>';
      return;
    }
    el.innerHTML = items.map(t => `
      <div class="card" id="card-${t.id}">
        <button class="del-btn" onclick="deleteTask(${t.id})" title="Hapus">✕</button>
        <div class="card-cat cat-${t.cat}">${catLabel[t.cat] || t.cat}</div>
        <div class="card-title">${esc(t.title)}</div>
        <div style="font-size:10px;color:var(--text3);margin-bottom:5px;margin-top:-2px;">${formatTimeRecent(t.modified || Date.now())}</div>
        <div class="card-footer">
          ${col !== 'todo' ? `<button class="card-btn" onclick="moveTask(${t.id},'${prev(col)}')">← Mundur</button>` : ''}
          ${col !== 'done' ? `<button class="card-btn" onclick="moveTask(${t.id},'${next(col)}')">${col==='todo'?'Mulai →':'Selesai ✓'}</button>` : ''}
          ${col === 'done' ? `<span class="card-btn done-badge">✓ Selesai</span>` : ''}
        </div>
      </div>
    `).join('');
  });
  
  updateHeaderStats();

  const total = tasks.length;
  const done = tasks.filter(t => t.col === 'done').length;
  const doing = tasks.filter(t => t.col === 'doing').length;
  const pct = total ? Math.round(done / total * 100) : 0;

  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progPct').textContent = pct + '%';
  document.getElementById('headerStats').innerHTML = `
    <div class="hstat"><strong>${total}</strong> Total</div>
    <div class="hstat"><strong>${doing}</strong> Berjalan</div>
    <div class="hstat"><strong>${done}</strong> Selesai</div>
    <div class="hstat"><strong>${pct}%</strong> Progress</div>
  `;
}

function prev(col) { return col === 'doing' ? 'todo' : 'doing'; }
function next(col) { return col === 'todo' ? 'doing' : 'done'; }

function addTask() {
  const input = document.getElementById('newTask');
  const title = input.value.trim();
  if (!title) { input.focus(); return; }
  const cat = document.getElementById('newCat').value;
  const col = document.getElementById('newCol').value;
  tasks.push({ id: nextId++, title, cat, col });
  input.value = '';
  save(); render();
}

function moveTask(id, col) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.col = col; save(); render(); }
}

function deleteTask(id) {
  if (!confirm('Hapus tugas ini?')) return;
  tasks = tasks.filter(t => t.id !== id);
  save(); render();
}

document.getElementById('newTask').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

load(); render();
</script>
</body>
</html>
