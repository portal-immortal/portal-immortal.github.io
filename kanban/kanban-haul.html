<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban Haul Abah KH Enjen Zainudin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f0e8; --surface: #fdfaf5; --surface2: #f0ebe0;
    --border: #ddd6c8; --border2: #c8bfad;
    --text: #1a1612; --text2: #6b6055; --text3: #9e9085;
    --accent: #8b5e3c; --accent-bg: #f7ede2;
    --todo-dot: #b0a090; --doing-dot: #5b8fcc; --done-dot: #5a9a6a;
    --cat-konsumsi-bg:#fff3e0; --cat-konsumsi-text:#8b4513;
    --cat-dekorasi-bg:#fce4ec; --cat-dekorasi-text:#8b1a4a;
    --cat-undangan-bg:#e3f0ff; --cat-undangan-text:#1a5296;
    --cat-perlengkapan-bg:#e8f5e9; --cat-perlengkapan-text:#1b5e20;
    --cat-acara-bg:#ede7f6; --cat-acara-text:#4527a0;
    --cat-koordinasi-bg:#e0f7f0; --cat-koordinasi-text:#00574b;
    --cat-lainnya-bg:#f0ebe0; --cat-lainnya-text:#6b6055;
  }
  body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* HEADER */
  header { background:var(--surface); border-bottom:1.5px solid var(--border); padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; position:sticky; top:0; z-index:10; }
  .brand { display:flex; align-items:center; gap:10px; }
  .brand img { width:42px; height:42px; border-radius:10px; object-fit:cover; flex-shrink:0; }
  .brand h1 { font-size:13px; font-weight:700; line-height:1.3; }
  .brand p { font-size:11px; color:var(--text2); }
  .header-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .hstat { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:4px 12px; font-size:12px; color:var(--text2); }
  .hstat strong { color:var(--text); font-weight:600; }
  .sync-status { font-size:11px; padding:4px 10px; border-radius:99px; border:1px solid var(--border); background:var(--surface2); color:var(--text3); display:flex; align-items:center; gap:5px; }
  .sync-dot { width:7px; height:7px; border-radius:50%; background:#aaa; flex-shrink:0; transition:background 0.3s; }
  .sync-dot.online { background:var(--done-dot); }
  .sync-dot.saving { background:#e8a020; animation:pulse 0.8s infinite; }
  .sync-dot.error { background:#c0392b; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  main { padding:1.5rem; max-width:1200px; margin:0 auto; }

  /* ADD FORM */
  .add-section { background:var(--surface); border:1.5px solid var(--border); border-radius:14px; padding:1rem 1.25rem; margin-bottom:1rem; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .add-section input[type="text"] { flex:1; min-width:200px; border:1.5px solid var(--border); border-radius:8px; padding:8px 12px; font-size:14px; font-family:inherit; background:var(--bg); color:var(--text); outline:none; }
  .add-section input:focus { border-color:var(--accent); }
  .add-section input::placeholder { color:var(--text3); }
  select { border:1.5px solid var(--border); border-radius:8px; padding:8px 10px; font-size:13px; font-family:inherit; background:var(--bg); color:var(--text); outline:none; cursor:pointer; }
  select:focus { border-color:var(--accent); }
  .btn-add { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:8px 18px; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; transition:opacity 0.15s; }
  .btn-add:hover { opacity:0.88; }

  /* FILTER */
  .filter-bar { display:flex; gap:6px; margin-bottom:1rem; flex-wrap:wrap; align-items:center; }
  .filter-label { font-size:12px; color:var(--text2); }
  .filter-btn { font-size:12px; padding:4px 12px; border:1.5px solid var(--border); border-radius:99px; background:var(--surface); color:var(--text2); cursor:pointer; font-family:inherit; font-weight:500; transition:all 0.12s; }
  .filter-btn:hover { border-color:var(--border2); color:var(--text); }
  .filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  /* PROGRESS */
  .progress-wrap { margin-bottom:1.25rem; }
  .progress-label { display:flex; justify-content:space-between; font-size:12px; color:var(--text2); margin-bottom:5px; }
  .progress-bar { background:var(--surface2); border-radius:99px; height:8px; overflow:hidden; border:1px solid var(--border); }
  .progress-fill { background:var(--done-dot); height:100%; border-radius:99px; transition:width 0.4s ease; }

  /* BOARD */
  .board { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; }
  @media(max-width:700px){ .board{grid-template-columns:1fr} }
  @media(max-width:1000px) and (min-width:701px){ .board{grid-template-columns:1fr 1fr} }
  .column { background:var(--surface); border:1.5px solid var(--border); border-radius:14px; padding:14px; min-height:240px; display:flex; flex-direction:column; }
  .col-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid var(--border); }
  .col-title { display:flex; align-items:center; gap:7px; font-size:13px; font-weight:600; }
  .col-dot { width:9px; height:9px; border-radius:50%; }
  .col-count { font-size:12px; background:var(--surface2); border:1px solid var(--border); border-radius:99px; padding:2px 9px; color:var(--text2); font-weight:500; }
  .cards { flex:1; display:flex; flex-direction:column; gap:8px; }
  .empty-col { flex:1; display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--text3); font-style:italic; padding:24px 0; }

  /* CARD */
  .card { background:var(--surface); border:1.5px solid var(--border); border-radius:10px; padding:10px 12px; position:relative; transition:border-color 0.15s, box-shadow 0.15s; animation:fadeIn 0.2s ease; cursor:pointer; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }
  .card:hover { border-color:var(--accent); box-shadow:0 2px 8px rgba(0,0,0,0.08); }
  .card-cat { display:inline-block; font-size:10px; font-weight:600; padding:2px 8px; border-radius:99px; margin-bottom:5px; }
  .card-title { font-size:13px; font-weight:500; color:var(--text); line-height:1.45; padding-right:22px; margin-bottom:3px; }
  .card-note-preview { font-size:11px; color:var(--text2); line-height:1.4; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-style:italic; }
  .card-timestamp { font-size:10px; color:var(--text3); margin-bottom:6px; }
  .card-footer { display:flex; gap:5px; flex-wrap:wrap; }
  .card-btn { font-size:11px; padding:3px 9px; border:1px solid var(--border); border-radius:6px; background:var(--bg); color:var(--text2); cursor:pointer; font-family:inherit; font-weight:500; transition:background 0.12s; }
  .card-btn:hover { background:var(--surface2); color:var(--text); }
  .card-btn.done-badge { background:#e8f5e9; color:#1b5e20; border-color:#b8dfc0; cursor:default; }
  .del-btn { position:absolute; top:8px; right:8px; background:none; border:none; cursor:pointer; font-size:15px; color:var(--text3); padding:2px 4px; border-radius:4px; line-height:1; transition:background 0.1s,color 0.1s; z-index:1; }
  .del-btn:hover { background:#fce4ec; color:#c62828; }

  .cat-konsumsi{background:var(--cat-konsumsi-bg);color:var(--cat-konsumsi-text)}
  .cat-dekorasi{background:var(--cat-dekorasi-bg);color:var(--cat-dekorasi-text)}
  .cat-undangan{background:var(--cat-undangan-bg);color:var(--cat-undangan-text)}
  .cat-perlengkapan{background:var(--cat-perlengkapan-bg);color:var(--cat-perlengkapan-text)}
  .cat-acara{background:var(--cat-acara-bg);color:var(--cat-acara-text)}
  .cat-koordinasi{background:var(--cat-koordinasi-bg);color:var(--cat-koordinasi-text)}
  .cat-lainnya{background:var(--cat-lainnya-bg);color:var(--cat-lainnya-text)}

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(26,22,18,0.45); backdrop-filter:blur(4px); z-index:100; display:flex; align-items:center; justify-content:center; padding:1rem; opacity:0; pointer-events:none; transition:opacity 0.2s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--surface); border:1.5px solid var(--border); border-radius:18px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.15); transform:translateY(12px); transition:transform 0.2s; }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal-header { padding:1.25rem 1.25rem 0; display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .modal-cat { display:inline-block; font-size:10px; font-weight:600; padding:2px 8px; border-radius:99px; margin-bottom:8px; }
  .modal-title { font-size:16px; font-weight:700; color:var(--text); line-height:1.4; flex:1; }
  .modal-close { background:none; border:none; cursor:pointer; font-size:20px; color:var(--text3); padding:2px; line-height:1; flex-shrink:0; border-radius:6px; }
  .modal-close:hover { background:var(--surface2); color:var(--text); }
  .modal-body { padding:1rem 1.25rem; }
  .modal-section-label { font-size:11px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px; margin-top:14px; }
  .modal-section-label:first-child { margin-top:0; }
  .modal-note-area { width:100%; border:1.5px solid var(--border); border-radius:10px; padding:10px 12px; font-size:13px; font-family:inherit; background:var(--bg); color:var(--text); resize:vertical; min-height:100px; outline:none; line-height:1.6; transition:border-color 0.15s; }
  .modal-note-area:focus { border-color:var(--accent); }
  .modal-note-area::placeholder { color:var(--text3); }
  .modal-meta { font-size:11px; color:var(--text3); display:flex; flex-wrap:wrap; gap:10px; margin-top:4px; }
  .modal-status-row { display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
  .status-btn { font-size:12px; padding:5px 14px; border:1.5px solid var(--border); border-radius:99px; background:var(--bg); color:var(--text2); cursor:pointer; font-family:inherit; font-weight:500; transition:all 0.12s; }
  .status-btn:hover { border-color:var(--border2); color:var(--text); }
  .status-btn.active-todo { background:#f0ebe0; color:#6b6055; border-color:#c8bfad; font-weight:600; }
  .status-btn.active-doing { background:#e3f0ff; color:#1a5296; border-color:#a0c4ef; font-weight:600; }
  .status-btn.active-done { background:#e8f5e9; color:#1b5e20; border-color:#b8dfc0; font-weight:600; }
  .modal-footer { padding:1rem 1.25rem; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .btn-save { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:8px 20px; font-size:13px; font-weight:600; font-family:inherit; cursor:pointer; transition:opacity 0.15s; }
  .btn-save:hover { opacity:0.88; }
  .btn-delete-modal { background:none; border:1px solid #f7c1c1; color:#a32d2d; border-radius:8px; padding:8px 14px; font-size:13px; font-family:inherit; cursor:pointer; transition:background 0.12s; }
  .btn-delete-modal:hover { background:#fcebeb; }

  /* LOADING */
  .loading-overlay { position:fixed; inset:0; background:rgba(245,240,232,0.85); display:flex; align-items:center; justify-content:center; z-index:999; backdrop-filter:blur(4px); }
  .loading-box { background:var(--surface); border:1.5px solid var(--border); border-radius:16px; padding:2rem 2.5rem; text-align:center; }
  .loading-box p { font-size:14px; color:var(--text2); margin-top:10px; }
  .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* TOAST */
  #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(60px); background:#1a1612; color:#fff; padding:9px 18px; border-radius:8px; font-size:13px; font-weight:500; transition:transform 0.25s ease; z-index:999; pointer-events:none; }
  #toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <p>Menyambungkan ke database...</p>
  </div>
</div>

<!-- MODAL DETAIL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div style="flex:1">
        <div class="modal-cat" id="modalCat"></div>
        <div class="modal-title" id="modalTitle"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-section-label">📝 Catatan & Hasil</div>
      <textarea class="modal-note-area" id="modalNote" placeholder="Tulis catatan di sini... &#10;Contoh: Ibu Sari 0812-xxx, nasi box 300 porsi, Rp 25rb/box, DP sudah transfer"></textarea>

      <div class="modal-section-label">📌 Status</div>
      <div class="modal-status-row">
        <button class="status-btn" id="sbTodo" onclick="setModalStatus('todo')">⬜ Belum mulai</button>
        <button class="status-btn" id="sbDoing" onclick="setModalStatus('doing')">🔵 Sedang jalan</button>
        <button class="status-btn" id="sbDone" onclick="setModalStatus('done')">✅ Selesai</button>
      </div>

      <div class="modal-section-label">🕐 Riwayat</div>
      <div class="modal-meta" id="modalMeta"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-delete-modal" onclick="deleteFromModal()">🗑 Hapus tugas</button>
      <button class="btn-save" onclick="saveModal()">💾 Simpan catatan</button>
    </div>
  </div>
</div>

function formatTS(ts) {
  if (!ts) return '-';
  const d = new Date(ts);
  const pad = n => String(n).padStart(2,'0');
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function prev(col) { return col==='doing'?'todo':'doing'; }
function next(col) { return col==='todo'?'doing':'done'; }

function render() {
  const arr = Object.values(tasks);
  const cols = ['todo','doing','done'];
  const filtered = activeFilter==='semua' ? arr : arr.filter(t=>t.cat===activeFilter);

  cols.forEach(col => {
    const items = filtered.filter(t=>t.col===col);
    const allCount = arr.filter(t=>t.col===col).length;
    document.getElementById('cnt-'+col).textContent = activeFilter==='semua' ? allCount : `${items.length}/${allCount}`;
    const el = document.getElementById('cards-'+col);
    if (!items.length) { el.innerHTML='<div class="empty-col">Tidak ada tugas</div>'; return; }
    el.innerHTML = items.map(t => `
      <div class="card" onclick="window.openModal('${t.id}')">
        <button class="del-btn" onclick="event.stopPropagation();window.deleteTask('${t.id}')" title="Hapus">✕</button>
        <div class="card-cat cat-${t.cat}">${catLabel[t.cat]||t.cat}</div>
        <div class="card-title">${esc(t.title)}</div>
        ${t.note ? `<div class="card-note-preview">📝 ${esc(t.note)}</div>` : ''}
        <div class="card-timestamp">✏️ ${formatTS(t.updatedAt)}</div>
        <div class="card-footer" onclick="event.stopPropagation()">
          ${col!=='todo'?`<button class="card-btn" onclick="window.moveTask('${t.id}','${prev(col)}')">← Mundur</button>`:''}
          ${col!=='done'?`<button class="card-btn" onclick="window.moveTask('${t.id}','${next(col)}')">${col==='todo'?'Mulai →':'Selesai ✓'}</button>`:''}
          ${col==='done'?`<span class="card-btn done-badge">✓ Selesai</span>`:''}
          <button class="card-btn" onclick="window.openModal('${t.id}')">📝 Catatan</button>
        </div>
      </div>
    `).join('');
  });

  const total = arr.length;
  const done = arr.filter(t=>t.col==='done').length;
  const doing = arr.filter(t=>t.col==='doing').length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progPct').textContent = pct+'%';
  document.getElementById('headerStats').innerHTML = `
    <span class="hstat"><strong>${total}</strong> Total</span>
    <span class="hstat"><strong>${doing}</strong> Berjalan</span>
    <span class="hstat"><strong>${done}</strong> Selesai</span>
    <span class="hstat"><strong>${pct}%</strong> Progress</span>
  `;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// ── MODAL ──
window.openModal = function(id) {
  const t = tasks[id];
  if (!t) return;
  currentModalId = id;
  currentModalStatus = t.col;

  document.getElementById('modalCat').className = 'modal-cat cat-'+t.cat;
  document.getElementById('modalCat').textContent = catLabel[t.cat]||t.cat;
  document.getElementById('modalTitle').textContent = t.title;
  document.getElementById('modalNote').value = t.note || '';
  document.getElementById('modalMeta').innerHTML =
    `<span>📅 Dibuat: ${formatTS(t.createdAt)}</span><span>✏️ Diubah: ${formatTS(t.updatedAt)}</span>`;

  updateStatusButtons(t.col);
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('modalNote').focus(), 200);
};

function updateStatusButtons(col) {
  ['todo','doing','done'].forEach(c => {
    const btn = document.getElementById('sb'+c.charAt(0).toUpperCase()+c.slice(1));
    btn.className = 'status-btn' + (c===col ? ' active-'+c : '');
  });
  currentModalStatus = col;
}

window.setModalStatus = function(col) {
  updateStatusButtons(col);
};

window.closeModal = function() {
  document.getElementById('modalOverlay').classList.remove('open');
  currentModalId = null;
};

window.handleOverlayClick = function(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
};

window.saveModal = function() {
  if (!currentModalId) return;
  const note = document.getElementById('modalNote').value.trim();
  const col = currentModalStatus;
  setSyncStatus('saving');
  update(ref(db, 'tasks/'+currentModalId), { note, col, updatedAt: Date.now() })
    .then(() => { setSyncStatus('online'); showToast('💾 Catatan tersimpan!'); closeModal(); })
    .catch(() => setSyncStatus('error'));
};

window.deleteFromModal = function() {
  if (!currentModalId) return;
  if (!confirm('Hapus tugas ini?')) return;
  setSyncStatus('saving');
  remove(ref(db, 'tasks/'+currentModalId))
    .then(() => { setSyncStatus('online'); showToast('🗑️ Dihapus'); closeModal(); })
    .catch(() => setSyncStatus('error'));
};

// ── FIREBASE ──
onValue(tasksRef, (snapshot) => {
  const data = snapshot.val();
  if (data) {
    tasks = data;
  } else if (isFirstLoad) {
    const defaults = {};
    const now = Date.now();
    defaultTasks.forEach(t => { defaults[t.id] = {...t, note:'', createdAt:now, updatedAt:now}; });
    set(tasksRef, defaults);
    tasks = defaults;
  }
  isFirstLoad = false;
  document.getElementById('loadingOverlay').style.display = 'none';
  setSyncStatus('online');
  render();
}, () => {
  setSyncStatus('error');
  document.getElementById('loadingOverlay').style.display = 'none';
  showToast('⚠️ Gagal terhubung ke database');
});

window.addTask = function() {
  const input = document.getElementById('newTask');
  const title = input.value.trim();
  if (!title) { input.focus(); return; }
  const cat = document.getElementById('newCat').value;
  const col = document.getElementById('newCol').value;
  const id = 'task_' + Date.now();
  const now = Date.now();
  setSyncStatus('saving');
  set(ref(db, 'tasks/'+id), { id, title, cat, col, note:'', createdAt:now, updatedAt:now })
    .then(() => { setSyncStatus('online'); showToast('✅ Tugas ditambahkan'); })
    .catch(() => setSyncStatus('error'));
  input.value = '';
};

window.moveTask = function(id, col) {
  setSyncStatus('saving');
  update(ref(db, 'tasks/'+id), { col, updatedAt:Date.now() })
    .then(() => { setSyncStatus('online'); showToast('🔄 Dipindahkan'); })
    .catch(() => setSyncStatus('error'));
};

window.deleteTask = function(id) {
  if (!confirm('Hapus tugas ini?')) return;
  setSyncStatus('saving');
  remove(ref(db, 'tasks/'+id))
    .then(() => { setSyncStatus('online'); showToast('🗑️ Dihapus'); })
    .catch(() => setSyncStatus('error'));
};

window.setFilter = function(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
};

document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });
document.getElementById('newTask').addEventListener('keydown', e => { if(e.key==='Enter') window.addTask(); });
</script>
</body>
</html>
